name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-sk:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sk
        run: cargo build --release -p sk
      - name: Package sk
        shell: bash
        run: |
          mkdir -p dist
          host="$(rustc -vV | awk '/host:/ {print $2}')"
          cp target/release/sk "dist/sk-${host}"
      - uses: actions/upload-artifact@v4
        with:
          name: sk-${{ matrix.os }}
          path: dist/sk-*

  release:
    needs: build-sk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Package installer
        run: |
          cp dotfiles/install.sh dist/install.sh
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("dist/install.sh")
          text = path.read_text()
          replacement = (
              'SKILLS_VERSION="${'
              + f'SKILLS_VERSION:-{os.environ["GITHUB_REF_NAME"]}'
              + '}"'
          )
          text = text.replace(
              'SKILLS_VERSION="${SKILLS_VERSION:-latest}"',
              replacement,
          )
          path.write_text(text)
          PY

      - name: Create Release with install.sh
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/install.sh \
            dist/sk-*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
